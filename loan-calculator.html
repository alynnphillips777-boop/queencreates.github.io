<!DOCTYPE html>
<html>
<head>
    <title>Loan Payment Calculator</title>
    <meta name="description" content="Free loan payment calculator. Calculate monthly payments instantly.">
</head>
<body style="font-family: Arial; text-align: center; padding: 40px;">

<h1>Loan Payment Calculator</h1>

<input type="number" id="amount" placeholder="Loan Amount">
<br><br>

<input type="number" id="rate" placeholder="Interest Rate (%)">
<br><br>

<input type="number" id="years" placeholder="Years">
<br><br>

<button onclick="calculateLoan()">Calculate</button>

<h2 id="result"></h2>

<script>
function calculateLoan() {
    let amount = document.getElementById("amount").value;
    let rate = document.getElementById("rate").value / 100 / 12;
    let years = document.getElementById("years").value * 12;

    let payment = (amount * rate) / (1 - Math.pow(1 + rate, -years));
    payment = payment.toFixed(2);

    document.getElementById("result").innerHTML = "Monthly Payment: $" + payment;
}
</script>

</body>
